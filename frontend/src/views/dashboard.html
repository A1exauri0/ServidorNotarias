<!-- Vista de Dashboard (Gráficas y KPIs) -->
<div id="vista-dashboard-wrapper">
    <!-- Grid de KPIs -->
    <section class="kpi-grid">
        <div class="kpi-card azul">
            <div class="kpi-info">
                <h3>PDFs Digitalizados</h3>
                <span class="kpi-valor" id="txtTotalPdfs">0</span>
            </div>
            <iconify-icon icon="mdi:file-pdf-box" class="kpi-icono"></iconify-icon>
        </div>

        <div class="kpi-card verde">
            <div class="kpi-info">
                <h3>Imágenes/Páginas Digitalizadas</h3>
                <span class="kpi-valor" id="txtTotalImagenes">0</span>
            </div>
            <iconify-icon icon="mdi:image-outline" class="kpi-icono"></iconify-icon>
        </div>

        <div class="kpi-card morado">
            <div class="kpi-info">
                <h3>Notarías</h3>
                <span class="kpi-valor" id="txtTotalNotarias">0</span>
            </div>
            <iconify-icon icon="mdi:map-marker-outline" class="kpi-icono"></iconify-icon>
        </div>
    </section>


    <!-- Grid de Gráficas Verticales -->
    <section class="seccion-graficas vertical">
        <!-- 1. Productividad por Turno (Archivos PDFs) -->
        <div class="grafica-box">
            <h3>Productividad por Turno (Archivos PDFs)</h3>
            <div class="canvas-container" style="height: 380px;">
                <canvas id="graficaProductividadTurnoPdfs"></canvas>
            </div>
        </div>

        <!-- 2. Productividad por Turno (Imágenes / Páginas) -->
        <div class="grafica-box" style="margin-top: 10px;">
            <h3>Productividad por Turno (Imágenes / Páginas)</h3>
            <div class="canvas-container" style="height: 380px;">
                <canvas id="graficaProductividadTurno"></canvas>
            </div>
        </div>
    <!-- Fila de Gráficas de Pastel (Total PDFs e Imágenes por Turno) -->
    <section style="display: flex; gap: 15px; flex-wrap: wrap; width: 100%; margin-bottom: 15px;">
        <div class="grafica-box" style="flex: 1; min-width: 290px;">
            <h3>Total de PDFs por Turno</h3>
            <div class="canvas-container" style="height: 300px; display: flex; justify-content: center; align-items: center;">
                <canvas id="graficaPastelPdfsTurno"></canvas>
            </div>
        </div>
        <div class="grafica-box" style="flex: 1; min-width: 290px;">
            <h3>Total de Imágenes por Turno</h3>
            <div class="canvas-container" style="height: 300px; display: flex; justify-content: center; align-items: center;">
                <canvas id="graficaPastelImagenesTurno"></canvas>
            </div>
        </div>
    </section>
        <!-- 3. Archivos PDFs Procesados por Notaría (Abajo) -->
        <div class="grafica-box" style="margin-top: 10px;">
            <h3>Archivos PDFs Procesados por Notaría</h3>
            <div class="canvas-container" style="height: 380px;">
                <canvas id="graficaBarrasPdfs"></canvas>
            </div>
        </div>
    </section>
</div>
