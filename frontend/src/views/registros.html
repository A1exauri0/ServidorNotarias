<!-- Vista de Ver Registros -->
<div id="vista-registros-wrapper">
    <div class="tabla-contenedor">
        <div class="tabla-cabecera">
            <h3>Últimos 100 Registros Procesados</h3>
            
            <!-- Barra de Filtros Dinámicos -->
            <div class="filtros-tabla-caja">
                <!-- Buscador de texto -->
                <div class="buscador-caja">
                    <iconify-icon icon="mdi:magnify" class="buscador-icono"></iconify-icon>
                    <input type="text" id="buscadorRegistros" placeholder="Buscar archivo o PC...">
                </div>

                <!-- Dropdowns Personalizados de Simulación Web (Custom Selects) -->
                <div class="custom-select-wrapper" id="wrapperFiltroUsuario">
                    <button class="custom-select-btn" id="btnFiltroUsuario" data-valor="">Todos los Usuarios</button>
                    <div class="custom-select-options" id="optionsFiltroUsuario">
                        <div class="custom-select-option" data-valor="">Todos los Usuarios</div>
                    </div>
                </div>

                <div class="custom-select-wrapper" id="wrapperFiltroNotaria">
                    <button class="custom-select-btn" id="btnFiltroNotaria" data-valor="">Todas las Notarías</button>
                    <div class="custom-select-options" id="optionsFiltroNotaria">
                        <div class="custom-select-option" data-valor="">Todas las Notarías</div>
                    </div>
                </div>

                <div class="custom-select-wrapper" id="wrapperFiltroVolumen">
                    <button class="custom-select-btn" id="btnFiltroVolumen" data-valor="">Todos los Volúmenes</button>
                    <div class="custom-select-options" id="optionsFiltroVolumen">
                        <div class="custom-select-option" data-valor="">Todos los Volúmenes</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="tabla-scroll">
            <table class="tabla-plana">
                <thead>
                    <tr>
                        <th style="width: 80px; text-align: center;">Exportado</th>
                        <th>Usuario</th>
                        <th>Turno</th>
                        <th>PC</th>
                        <th>Notaría</th>
                        <th>Volumen</th>
                        <th>Archivo</th>
                        <th style="width: 80px; text-align: center;">Páginas</th>
                        <th style="text-align: right;">Fecha y Hora</th>
                    </tr>
                </thead>
                <tbody id="tablaRegistrosBody">
                    <!-- Registros cargados dinámicamente -->
                </tbody>
            </table>
        </div>
    </div>
</div>
