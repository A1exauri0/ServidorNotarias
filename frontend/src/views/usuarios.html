<!-- Vista de Administración de Usuarios y PIN Maestro -->
<div id="vista-usuarios-wrapper">
    
    <!-- Configuración del PIN Maestro -->
    <div class="tarjeta-personalizada pin-maestro-caja" style="margin-bottom: 25px; padding: 20px;">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
            <div>
                <h4 style="margin: 0 0 5px 0; font-family: var(--tipografia-titulos); font-size: 15px; color: var(--color-texto-principal);">PIN Maestro de Autorización</h4>
                <p style="margin: 0; font-size: 12px; color: var(--color-texto-secundario);">Utilizado por los clientes C# para validar permisos críticos locales</p>
            </div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <input type="password" id="txtPinMaestro" maxlength="4" placeholder="••••" style="width: 90px; text-align: center; font-size: 15px; letter-spacing: 4px;" class="filtro-select">
                <button id="btnGuardarPinMaestro" class="btn-filtrar" style="padding: 8px 16px;">
                    <iconify-icon icon="mdi:content-save-outline" style="vertical-align: middle; margin-right: 4px;"></iconify-icon>Guardar
                </button>
            </div>
        </div>
    </div>

    <!-- Tabla y CRUD de Usuarios -->
    <div class="tabla-contenedor">
        <div class="tabla-cabecera" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; margin-bottom: 20px;">
            <div style="display: flex; align-items: center; gap: 15px;">
                <h3>Administración de Capturistas</h3>
                <button id="btnIntercambiarTurnos" class="btn-icono-top" title="Cambiar turnos masivamente (Matutino <-> Vespertino)" style="border-radius: 50%; width: 34px; height: 34px;">
                    <iconify-icon icon="mdi:swap-horizontal"></iconify-icon>
                </button>
            </div>
            
            <div style="display: flex; align-items: center; gap: 10px;">
                <div class="buscador-caja">
                    <iconify-icon icon="mdi:magnify" class="buscador-icono"></iconify-icon>
                    <input type="text" id="buscadorUsuarios" placeholder="Buscar usuario o nombre...">
                </div>
                <button id="btnAgregarUsuario" class="btn-filtrar" style="background-color: var(--color-primario); border-color: var(--color-primario); color: white;">
                    <iconify-icon icon="mdi:account-plus-outline" style="vertical-align: middle; margin-right: 4px;"></iconify-icon>Nuevo Usuario
                </button>
            </div>
        </div>

        <div class="tabla-scroll">
            <table class="tabla-plana">
                <thead>
                    <tr>
                        <th style="width: 60px; text-align: center;">ID</th>
                        <th>Nombre Completo</th>
                        <th>Nombre de Usuario</th>
                        <th style="width: 100px; text-align: center;">PIN</th>
                        <th>Turno</th>
                        <th style="width: 150px; text-align: right;">Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaUsuariosBody">
                    <!-- Los usuarios se cargarán de forma dinámica con JS -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal Formulario de Usuario (Crear / Editar) -->
    <div id="modalUsuario" class="modal-superpuesto" style="display: none;">
        <div class="modal-contenido">
            <div class="modal-cabecera">
                <h3 id="modalUsuarioTitulo">Nuevo Usuario</h3>
                <button id="btnCerrarModal" class="btn-cerrar-modal">
                    <iconify-icon icon="mdi:close"></iconify-icon>
                </button>
            </div>
            <div class="modal-cuerpo">
                <form id="formularioUsuario" onsubmit="return false;">
                    <input type="hidden" id="txtIdUsuario">
                    
                    <div class="campo-formulario">
                        <label for="txtNombreCompleto">Nombre Completo:</label>
                        <input type="text" id="txtNombreCompleto" required placeholder="EJ: ANGEL ALFONSO GONZALES TRUJILLO" style="text-transform: uppercase;">
                    </div>
                    
                    <div class="campo-formulario">
                        <label for="txtNombreUsuario">Nombre de Usuario:</label>
                        <input type="text" id="txtNombreUsuario" required placeholder="EJ: angel.trujillo" style="text-transform: lowercase;">
                    </div>
                    
                    <div class="campo-formulario-doble" style="display: flex; gap: 15px; margin-top: 15px;">
                        <div class="campo-formulario" style="flex: 1;">
                            <label for="txtPin">PIN (4 Dígitos):</label>
                            <input type="text" id="txtPin" required maxlength="4" placeholder="1234" style="text-align: center; letter-spacing: 2px;">
                        </div>
                        <div class="campo-formulario" style="flex: 1;">
                            <label for="cmbTurno">Turno:</label>
                            <select id="cmbTurno" class="filtro-select" style="width: 100%; height: 38px; border-radius: 6px; padding: 6px 10px;">
                                <option value="Matutino">Matutino</option>
                                <option value="Vespertino">Vespertino</option>
                                <option value="Nocturno">Nocturno</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="modal-acciones" style="margin-top: 25px; display: flex; justify-content: flex-end; gap: 10px;">
                        <button type="button" id="btnCancelarUsuario" class="btn-filtrar" style="background-color: transparent; border: 1px solid var(--color-tarjeta-borde); color: var(--color-texto-secundario); height: 38px; padding: 0 20px;">Cancelar</button>
                        <button type="submit" id="btnGuardarUsuario" class="btn-filtrar" style="background-color: var(--color-primario); border-color: var(--color-primario); color: white; height: 38px; padding: 0 20px;">Guardar Usuario</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
