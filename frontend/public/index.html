<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servidor de Auditoría y Panel Administrativo</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Iconify CDN -->
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- CSS Estilos -->
    <link rel="stylesheet" href="../src/style.css">
</head>
<body>
    <div class="contenedor-app">
        <!-- Barra Lateral (Sidebar) -->
        <aside class="barra-lateral">
            <div class="logo-seccion">
                <iconify-icon icon="mdi:shield-check" class="icono-logo"></iconify-icon>
                <h2 class="texto-menu">Auditoría Local</h2>
                <button id="btnColapsar" class="btn-colapsar" title="Colapsar menú">
                    <iconify-icon icon="mdi:menu"></iconify-icon>
                </button>
            </div>
            
            <nav class="menu-navegacion">
                <button class="nav-item activo" data-tab="dashboard">
                    <iconify-icon icon="material-symbols:bar-chart-rounded" class="icono-menu"></iconify-icon>
                    <span class="texto-menu">Dashboard</span>
                </button>
                <button class="nav-item" data-tab="registros">
                    <iconify-icon icon="mdi:file-document-outline" class="icono-menu"></iconify-icon>
                    <span class="texto-menu">Ver Registros</span>
                </button>
                <button class="nav-item" data-tab="productividad">
                    <iconify-icon icon="mdi:table-large" class="icono-menu"></iconify-icon>
                    <span class="texto-menu">Productividad</span>
                </button>
                <button class="nav-item" data-tab="usuarios">
                    <iconify-icon icon="mdi:account-group-outline" class="icono-menu"></iconify-icon>
                    <span class="texto-menu">Usuarios</span>
                </button>
            </nav>

            <div class="info-servidor">
                <div class="servidor-status">
                    <span class="indicador activo"></span>
                    <span class="texto-status texto-menu">Servidor Activo (3000)</span>
                </div>
            </div>
        </aside>

        <!-- Contenido Principal -->
        <main class="contenido-principal">
            <!-- Header -->
            <header class="encabezado">
                <div class="titulo-pagina">
                    <h1>Resumen de Productividad</h1>
                    <p>Monitoreo y KPIs locales en tiempo real</p>
                </div>

                <!-- Filtros y Controles del Header -->
                <div class="controles-header">
                    <div class="filtros-fecha">
                        <div class="campo-fecha">
                            <label for="fechaInicio">Inicio:</label>
                            <input type="date" id="fechaInicio">
                        </div>
                        <div class="campo-fecha">
                            <label for="fechaFin">Fin:</label>
                            <input type="date" id="fechaFin">
                        </div>
                        <button id="btnFiltrar" class="btn-filtrar">
                            <iconify-icon icon="mdi:magnify" style="vertical-align: middle; margin-right: 4px;"></iconify-icon>Aplicar
                        </button>
                    </div>

                    <!-- Botones de Acción de Barra Superior (Modo Claro/Oscuro y Actualizar) -->
                    <div class="acciones-barra-superior">
                        <button id="btnActualizar" class="btn-icono-top" title="Actualizar datos">
                            <iconify-icon icon="mdi:refresh"></iconify-icon>
                        </button>
                        <button id="btnTema" class="btn-icono-top" title="Cambiar tema">
                            <iconify-icon icon="mdi:weather-sunny"></iconify-icon>
                        </button>
                    </div>
                </div>
            </header>

            <!-- Contenedor dinámico de Vistas Modulares -->
            <div id="contenido-vista"></div>
        </main>
    </div>

    <!-- JS de la App -->
    <script src="../src/js/tema.js"></script>
    <script src="../src/js/usuarios.js"></script>
    <script src="../src/js/productividad.js"></script>
    <script src="../src/js/app.js"></script>
</body>
</html>
